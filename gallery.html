<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="One more Kilo!"/>
<meta name="theme-color" content="#0f0f0f" id="meta-theme-color"/>
<title>Gallery — One more Kilo!</title>
<script>
// Runs before CSS paints so there's no flash of the wrong theme
(function () {
  var mode = localStorage.getItem('wk_thememode') || 'auto';
  var accent = localStorage.getItem('wk_accent') || 'green';
  var effective = mode === 'auto' ? ((window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) ? 'light' : 'dark') : mode;
  document.documentElement.setAttribute('data-theme', effective);
  document.documentElement.setAttribute('data-accent', accent);
})();
</script>
<link rel="stylesheet" href="css/app.css"/>
</head>
<body>
<div class="app">
  <div class="header">
    <div><h1>Gallery</h1><div class="header-sub" id="header-sub">Ectomorph mass builder</div></div>
    <div class="header-account" id="header-account">
      <button class="header-account-btn" id="header-account-btn" onclick="headerAccountClick()">Log in</button>
    </div>
  </div>
  <div class="scroll">
    <div class="section active">
      <div class="section-heading">Progress gallery</div>
      <div class="info-body" style="margin-bottom:12px">Take or upload photos to watch your body change over time. Photos are grouped by day and back up to your account when you're signed in.</div>
      <div class="ex-actions" style="margin-bottom:18px">
        <label class="ex-action-btn" style="text-align:center">📷 Take photo
          <input type="file" accept="image/*" capture="environment" hidden onchange="addGalleryPhoto(this)"/>
        </label>
        <label class="ex-action-btn" style="text-align:center">🖼 Upload
          <input type="file" accept="image/*" hidden onchange="addGalleryPhoto(this)"/>
        </label>
      </div>
      <div id="gallery-list"></div>
    </div>
  </div>
</div>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="js/data.js"></script>
<script src="js/theme.js"></script>
<script src="js/storage.js"></script>
<script src="js/cloud.js"></script>
<script src="js/overlays.js"></script>
<script src="js/profileui.js"></script>
<script src="js/cards.js"></script>
<script src="js/plan.js"></script>
<script src="js/charts.js"></script>
<script src="js/routines.js"></script>
<script src="js/gallery.js"></script>
<script src="js/library.js"></script>
<script src="js/init.js"></script>
</body>
</html>
